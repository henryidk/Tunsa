services:
  postgres:
    image: postgres:16-alpine
    container_name: tunsa_postgres
    environment:
      POSTGRES_USER: ferre_tunsa
      POSTGRES_PASSWORD: REDACTED
      POSTGRES_DB: ferreteria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferre_tunsa -d ferreteria_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tunsa_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tunsa_backend
    environment:
      DATABASE_URL: "postgresql://ferre_tunsa:REDACTED@postgres:5432/ferreteria_db?schema=public"
      JWT_SECRET: "REDACTED"
      JWT_REFRESH_SECRET: "REDACTED"
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "7d"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tunsa_frontend
    environment:
      VITE_API_URL: "http://localhost:4000/api"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
